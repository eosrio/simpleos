# SimplEOS E2E Test — nodeos configuration
# Single-node dev chain optimized for fast block production

# Producer
plugin = eosio::producer_plugin
plugin = eosio::producer_api_plugin
producer-name = eosio
enable-stale-production = true

# Chain
plugin = eosio::chain_plugin
plugin = eosio::chain_api_plugin
chain-state-db-size-mb = 4096
abi-serializer-max-time-ms = 2000
max-transaction-time = 500
contracts-console = true
# Enable /v1/chain/get_accounts_by_authorizers — lets wallets discover accounts
# from a public key without needing the legacy history_api_plugin or Hyperion.
enable-account-queries = true

# State History Plugin (SHiP) — needed for future Hyperion testing
plugin = eosio::state_history_plugin
state-history-endpoint = 0.0.0.0:8080
trace-history = true
chain-state-history = true

# HTTP
plugin = eosio::http_plugin
http-server-address = 0.0.0.0:8888
http-validate-host = false
access-control-allow-origin = *
http-max-response-time-ms = 5000

# Net (disabled — single node dev chain)
# plugin = eosio::net_plugin
